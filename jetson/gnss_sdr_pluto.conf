; =============================================================================
; gnss_sdr_pluto.conf
; GNSS-SDR 0.0.21 — PlutoSDR (clone) signal source, GPS L1 C/A
; Target: Jetson Nano (JetPack 4.6, Ubuntu 18.04)
;
; Usage:
;   gnss-sdr --config_file=gnss_sdr_pluto.conf
;
; Before running:
;   1. Verify PlutoSDR is visible:  iio_info -s
;   2. Adjust SignalSource.URI to match your device (see iio_info output).
;      Common values:
;        ip:192.168.2.1    (USB RNDIS/ECM — recommended, most stable)
;        usb:1.6.5         (USB IIO backend — replace with actual bus:dev.num)
;   3. Point a passive GPS patch antenna at open sky.
;   4. PVT output is written to ./PVT/  (NMEA + RINEX).
;
; Resource budget note (Jetson Nano Maxwell GPU, 4 GB shared):
;   4 GPS channels + PlutoSDR driver + OS ≈ 60–70% CPU.
;   Keep Channels_GPS.count <= 4 if you plan to run the CNN inference
;   pipeline concurrently (demo_inference.py).  The CNN itself runs on
;   the GPU and does not compete for CPU headroom significantly.
;
; =============================================================================

[GNSS-SDR]

; Internal sample rate must equal SignalSource.sampling_frequency.
; Both the acquisition and tracking correlators are timed against this.
GNSS-SDR.internal_fs_sps=5000000


; =============================================================================
; Signal Source — PlutoSDR (ADALM-PlutoSDR compatible clone)
; =============================================================================
[SignalSource]
SignalSource.implementation=PlutosdrSignalSource

; --- Connection ---
; Adjust URI to match your device.  Run 'iio_info -s' to find the correct
; USB URI (e.g. usb:1.6.5) or use the IP URI if USB Ethernet is up.
SignalSource.URI=ip:192.168.2.1

; --- RF parameters ---
SignalSource.freq=1575420000           ; GPS L1 centre, Hz
SignalSource.sampling_frequency=5000000 ; 5 MSPS — matches training data
SignalSource.bandwidth=5000000          ; 5 MHz passband (AD9363 minimum ≈ 1 MHz)

; --- Gain ---
; gain_mode_rx1: slow_attack (recommended for open-sky GPS; AGC tracks fading)
;                fast_attack (for pulsed jammers; may cause PLL instability)
;                manual      (set gain_rx1 explicitly; useful for jamming tests)
SignalSource.gain_mode_rx1=slow_attack
; gain_rx1 is ignored when gain_mode_rx1 != manual.
; If switching to manual, 40–50 dB is a reasonable open-sky starting point.
SignalSource.gain_rx1=40

; --- IQ corrections (recommended: all on) ---
; quadrature: corrects I/Q amplitude and phase imbalance
; rf_dc:      removes RF front-end DC offset
; bb_dc:      removes baseband DC offset (PlutoSDR clones often need this)
SignalSource.quadrature=true
SignalSource.rf_dc=true
SignalSource.bb_dc=true

; --- Buffer size ---
; 0x8000 = 32768 samples per DMA buffer (~6.5 ms at 5 MSPS).
; Smaller values reduce latency; larger values reduce USB transfer overhead.
; Do not set below 0x1000 — IIO will reject the request.
SignalSource.buffer_size=32768

; --- Item type ---
; PlutosdrSignalSource always outputs gr_complex (float32 I/Q pairs).
SignalSource.item_type=gr_complex


; =============================================================================
; Signal Conditioner
; =============================================================================
; Pass-through: the PlutoSDR source already outputs complex float at 5 MSPS.
; No additional decimation or data-type conversion is needed.
[SignalConditioner]
SignalConditioner.implementation=Pass_Through

[DataTypeAdapter]
DataTypeAdapter.implementation=Pass_Through

[InputFilter]
InputFilter.implementation=Pass_Through

[Resampler]
Resampler.implementation=Pass_Through


; =============================================================================
; Channels — GPS L1 C/A
; =============================================================================
; Keep count <= 4 on Jetson Nano when running concurrent CNN inference.
; Increase to 6–8 for standalone GNSS-SDR (no inference pipeline).
[Channels_GPS]
Channels_GPS.count=4

; All four channels track GPS L1 C/A (signal id "1C")
[Channel0]
Channel0.signal=1C

[Channel1]
Channel1.signal=1C

[Channel2]
Channel2.signal=1C

[Channel3]
Channel3.signal=1C


; =============================================================================
; Acquisition — GPS L1 C/A PCPS
; =============================================================================
[Acquisition_GPS]
Acquisition_GPS.implementation=GPS_L1_CA_PCPS_Acquisition
Acquisition_GPS.item_type=gr_complex

; Coherent integration: 1 ms = one C/A code epoch.
; Increasing to 2 ms improves sensitivity but requires Doppler pre-filtering.
Acquisition_GPS.coherent_integration_time_ms=1

; Detection threshold.  Lower = more sensitive but more false alarms.
; 0.008 is a reasonable starting point for open-sky GPS.
; If acquisition fails, try lowering to 0.005.
Acquisition_GPS.threshold=0.008

; Doppler search range and step (Hz).
; ±5000 Hz covers typical open-sky Doppler ± small clock error.
; For a stationary receiver, ±3000 Hz is sufficient.
Acquisition_GPS.doppler_max=5000
Acquisition_GPS.doppler_step=250

; Use CFAR threshold normalisation for robustness against broadband interference.
Acquisition_GPS.use_CFAR_algorithm=false

; Dump raw acquisition output for debugging (disable in production)
Acquisition_GPS.dump=false
Acquisition_GPS.dump_filename=./acq_dump/GPS_L1_CA


; =============================================================================
; Tracking — GPS L1 C/A DLL-PLL
; =============================================================================
[Tracking_GPS]
Tracking_GPS.implementation=GPS_L1_CA_DLL_PLL_Tracking
Tracking_GPS.item_type=gr_complex

; PLL bandwidth (Hz): wider = faster acquisition, noisier.
; 35 Hz is standard for open-sky; reduce to 15–20 Hz in high-multipath.
Tracking_GPS.pll_bw_hz=35.0

; DLL bandwidth (Hz): narrower = more stable code phase.
Tracking_GPS.dll_bw_hz=2.0

; Early-Minus-Late spacing (chips): 0.5 is standard.
Tracking_GPS.early_late_space_chips=0.5

; Dump correlator outputs (useful for debugging tracking loops).
Tracking_GPS.dump=false
Tracking_GPS.dump_filename=./trk_dump/GPS_L1_CA_CH


; =============================================================================
; Telemetry Decoder — GPS L1 C/A NAV message
; =============================================================================
[TelemetryDecoder_GPS]
TelemetryDecoder_GPS.implementation=GPS_L1_CA_Telemetry_Decoder

; Dump decoded navigation bits for inspection.
TelemetryDecoder_GPS.dump=false


; =============================================================================
; Observables — pseudorange and carrier phase computation
; =============================================================================
[Observables]
Observables.implementation=Hybrid_Observables

Observables.dump=false
Observables.dump_filename=./obs_dump/observables


; =============================================================================
; PVT — Position, Velocity, Time
; =============================================================================
[PVT]
PVT.implementation=RTKLIB_PVT

; Positioning mode: Single (standalone GPS, no corrections)
PVT.positioning_mode=Single

; Update rates
PVT.output_rate_ms=100          ; compute PVT every 100 ms
PVT.display_rate_ms=500         ; print to console every 500 ms

; --- NMEA output ---
; Written to PVT.nmea_dump_filename; consumed by the GNSSLogger baseline.
PVT.flag_nmea_tty_port=false
PVT.nmea_dump_filename=./PVT/gnss_sdr_pvt.nmea

; --- RINEX output (optional — useful for post-processing) ---
PVT.rinex_version=2
PVT.rinex_output_path=./PVT/

; --- RTK / raw measurement dump ---
PVT.dump=false
PVT.dump_filename=./pvt_dump/PVT


; =============================================================================
; Notes for integration with the CNN inference pipeline
; =============================================================================
;
; Architecture decision (from prior session):
;   Run GNSS-SDR only as a position/timing reference — it does NOT need to
;   share the PlutoSDR hardware with the interference classifier.
;   Use a separate u-blox M8 module for GNSS-SDR reference navigation, and
;   dedicate the PlutoSDR + Jetson GPU entirely to the GNU Radio + TensorRT
;   inference pipeline (demo_inference.py).
;
;   If a second receiver is not available, the two processes CAN share one
;   PlutoSDR via a GNU Radio IQ tap, but this requires a custom signal source
;   that wraps GNSS-SDR and also feeds buffers to the classifier.  This is
;   significantly more complex and is NOT recommended given the thesis deadline.
;
; PlutoSDR clone compatibility:
;   Most clones advertise the same IIO interface as the original ADALM-PlutoSDR.
;   If GNSS-SDR fails to open the device, verify the URI with:
;       iio_info -s                 (scan — shows actual USB URI)
;       iio_info -u ip:192.168.2.1  (test IP URI)
;   Then update SignalSource.URI accordingly.
;
;   Some clones ship with AD9363 (not AD9364) — the AD9363 has the same IIO
;   interface but a narrower RF range (325–3800 MHz vs 70–6000 MHz for AD9364).
;   GPS L1 at 1575 MHz is well within both chips' range.
;
; Gain tuning:
;   If acquisition consistently fails (< 4 satellites tracked after 60 s),
;   try switching to manual gain and incrementing in 5 dB steps:
;       SignalSource.gain_mode_rx1=manual
;       SignalSource.gain_rx1=50
;   Clones sometimes have gain calibration offsets vs the reference design.
;
; =============================================================================
