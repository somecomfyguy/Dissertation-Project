; =============================================================================
; gnss_sdr_fifo.conf
; GNSS-SDR 0.0.21 — File Signal Source reading from a named FIFO pipe
; Target: Jetson Nano (JetPack 4.6, Ubuntu 18.04)
;
; This config reads IQ samples from a named pipe (FIFO) written by
; demo_inference.py, allowing GNSS-SDR to run in parallel with the
; ML interference classifier on the same IQ stream.
;
; Data format written by demo_inference.py into the FIFO:
;   Interleaved int16:  [I0, Q0, I1, Q1, ...]
;   Sample rate: 5 MSPS (matching PlutoSDR capture and training pipeline)
;
; The FIFO path is /tmp/gnss_iq_fifo by default. Both this config and
; demo_inference.py must agree on the path.
;
; Usage:
;   1. Start the launcher:  ./launch_parallel.sh --trt model.trt
;      (which creates the FIFO, starts GNSS-SDR, then starts the classifier)
;   OR manually:
;   1. mkfifo /tmp/gnss_iq_fifo
;   2. gnss-sdr --config_file=gnss_sdr_fifo.conf &
;   3. python3 demo_inference.py --trt model.trt --uri ip:192.168.2.1 --fifo /tmp/gnss_iq_fifo
;
; Note: GNSS-SDR will block on open() until demo_inference.py starts
;       writing to the pipe. This is normal FIFO behaviour.
; =============================================================================

[GNSS-SDR]

; ---------------------------------------------------------------------------
; Global parameters
; ---------------------------------------------------------------------------
; Internal processing rate must match the input sample rate from the FIFO.
; The PlutoSDR captures at 5 MSPS and demo_inference.py writes at 5 MSPS.
GNSS-SDR.internal_fs_sps=5000000

; ---------------------------------------------------------------------------
; Signal Source — File (FIFO pipe)
; ---------------------------------------------------------------------------
SignalSource.implementation=File_Signal_Source

; Path to the named pipe created by the launcher script.
SignalSource.filename=/tmp/gnss_iq_fifo

; Sample format: interleaved int16 pairs [I, Q] — 4 bytes per complex sample.
; GNSS-SDR's File_Signal_Source accepts "ishort" for interleaved signed 16-bit.
SignalSource.item_type=ishort
SignalSource.sampling_frequency=5000000

; GPS L1 centre frequency — informational for the receiver, not used for
; tuning (the PlutoSDR is already tuned by demo_inference.py).
SignalSource.freq=1575420000

; Read indefinitely (0 = no sample limit). The FIFO provides a continuous
; stream as long as demo_inference.py is running.
SignalSource.samples=0

; Do not repeat — the FIFO is a live stream, not a file to loop.
SignalSource.repeat=false

; Disable raw dump to avoid filling disk during live operation.
SignalSource.dump=false
SignalSource.dump_filename=./signal_source.dat

; Enable valve to prevent GNSS-SDR from hanging when the FIFO is closed.
; When demo_inference.py exits and closes the pipe, the valve detects EOF
; and gracefully shuts down the receiver.
SignalSource.enable_throttle_control=false

; ---------------------------------------------------------------------------
; Signal Conditioner
; ---------------------------------------------------------------------------
; Convert ishort to gr_complex for the receiver processing chain.
SignalConditioner.implementation=Signal_Conditioner

DataTypeAdapter.implementation=Ishort_To_Complex

InputFilter.implementation=Fir_Filter
InputFilter.input_item_type=gr_complex
InputFilter.output_item_type=gr_complex
InputFilter.taps_item_type=float
InputFilter.number_of_taps=11
InputFilter.number_of_bands=2
InputFilter.band1_begin=0.0
InputFilter.band1_end=0.45
InputFilter.band2_begin=0.55
InputFilter.band2_end=1.0
InputFilter.ampl1_begin=1.0
InputFilter.ampl1_end=1.0
InputFilter.ampl2_begin=0.0
InputFilter.ampl2_end=0.0
InputFilter.band1_error=1.0
InputFilter.band2_error=1.0
InputFilter.filter_type=bandpass
InputFilter.grid_density=16
InputFilter.dump=false

Resampler.implementation=Pass_Through

; ---------------------------------------------------------------------------
; Channels — GPS L1 C/A only
; ---------------------------------------------------------------------------
; 4 channels to limit CPU load on the Jetson Nano while running alongside
; the classifier. Increase to 8 if CPU headroom allows.
Channels_1C.count=4
Channels.in_acquisition=4
Channel.signal=1C

; ---------------------------------------------------------------------------
; Acquisition — GPS L1 C/A
; ---------------------------------------------------------------------------
Acquisition_1C.implementation=GPS_L1_CA_PCPS_Acquisition
Acquisition_1C.item_type=gr_complex
Acquisition_1C.coherent_integration_time_ms=1
Acquisition_1C.pfa=0.01
Acquisition_1C.doppler_max=5000
Acquisition_1C.doppler_step=250
Acquisition_1C.dump=false
Acquisition_1C.dump_filename=./acq_dump

; ---------------------------------------------------------------------------
; Tracking — GPS L1 C/A
; ---------------------------------------------------------------------------
Tracking_1C.implementation=GPS_L1_CA_DLL_PLL_Tracking
Tracking_1C.item_type=gr_complex
Tracking_1C.pll_bw_hz=30.0
Tracking_1C.dll_bw_hz=4.0
Tracking_1C.early_late_space_chips=0.5
Tracking_1C.dump=false
Tracking_1C.dump_filename=./tracking_ch_

; ---------------------------------------------------------------------------
; Telemetry Decoder
; ---------------------------------------------------------------------------
TelemetryDecoder_1C.implementation=GPS_L1_CA_Telemetry_Decoder
TelemetryDecoder_1C.dump=false

; ---------------------------------------------------------------------------
; Observables
; ---------------------------------------------------------------------------
Observables.implementation=Hybrid_Observables
Observables.dump=false
Observables.dump_filename=./observables.dat

; ---------------------------------------------------------------------------
; PVT — Position, Velocity, Time
; ---------------------------------------------------------------------------
PVT.implementation=RTKLIB_PVT
PVT.positioning_mode=Single
PVT.output_rate_ms=1000
PVT.display_rate_ms=1000
PVT.iono_model=Broadcast
PVT.trop_model=Saastamoinen
PVT.flag_rtcm_server=false
PVT.rinex_version=3
PVT.rinexobs_rate_ms=1000
PVT.nmea_dump_filename=./gnss_sdr_pvt.nmea
PVT.flag_nmea_tty_port=false
PVT.dump=false
PVT.dump_filename=./pvt_dump
